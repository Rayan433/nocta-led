<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Z-LIGHT</title>
<meta name="robots" content="noindex">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23C24B4B'/%3E%3Cstop offset='100%25' stop-color='%238C2E2E'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='%230A0A0A'/%3E%3Ccircle cx='50' cy='50' r='28' fill='url(%23g)'/%3E%3C/svg%3E">

<style>
  @font-face {
    font-family: 'Inter';
    src: url('fonts/Inter-variable.ttf') format('truetype-variations');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Rajdhani';
    src: url('fonts/Rajdhani-Medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Rajdhani';
    src: url('fonts/Rajdhani-SemiBold.ttf') format('truetype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Rajdhani';
    src: url('fonts/Rajdhani-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
</style>

<style>
  :root {
    --void: #0A0A0A;
    --panel: #1F1A1A;
    --magenta: #8C2E2E;
    --cyan: #C24B4B;
    --fog: #D6C9C9;
    --fog-dim: #A89595;
    --white: #FAF4F4;
    --line: rgba(250,244,244,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--void);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .glow-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.3;
  }
  .blob-1 { width: 420px; height: 420px; background: var(--magenta); top: -140px; right: -100px; }
  .blob-2 { width: 360px; height: 360px; background: var(--cyan); bottom: -160px; left: -100px; }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 480px;
  }

  .code {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(4rem, 14vw, 7rem);
    line-height: 1;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }

  p {
    color: var(--fog);
    font-size: 0.97rem;
    margin-bottom: 32px;
  }

  .btn-primary {
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    color: var(--void);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.95rem;
    padding: 16px 32px;
    border-radius: 2px;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(140,46,46,0.35); }

  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="glow-blob blob-1" aria-hidden="true"></div>
<div class="glow-blob blob-2" aria-hidden="true"></div>

<div class="content">
  <div class="code">404</div>
  <h1>Cette page n'existe pas</h1>
  <p>Le lien que vous avez suivi est peut-être incorrect, ou la page a été déplacée. Retournez à l'accueil pour continuer votre navigation.</p>
  <a href="index.html" class="btn-primary">Retour à l'accueil</a>
</div>

</body>
</html>
